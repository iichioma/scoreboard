<!DOCTYPE html>
<html>
    <head>
        <title>Scoreboard</title>
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <div class="scores">
                     <h1 id="home-el">0</h1>
                </div>
               <div class="btns">
                    <button id="add-one">+1</button>
                    <button id="add-two">+2</button>
                    <button id="add-three">+3</button>
               </div>
            </div> 
            <div>
                <h3>GUEST</h3>
                <div class="scores">
                     <h1 id="guest-el">0</h1>
                </div>
                <div class="btns">
                    <button id="add-one">+1</button>
                    <button id="add-two">+2</button>
                    <button id="add-three">+3</button>
               </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
